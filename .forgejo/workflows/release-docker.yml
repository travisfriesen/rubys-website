name: Release Docker Build

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: debian-13
    permissions:
      contents: read
    env:
      REGISTRY: git.travisf.ca
      IMAGE_REPO: git.travisf.ca/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Load vault secret config
        uses: https://git.travisf.ca/infrastructure-ci/vault-config-loader@v1.1
        with:
          config_file: vault_secrets.cfg

      - name: Fetch secrets from Vault
        uses: https://git.travisf.ca/infrastructure-ci/vault-action@v3
        with:
          url: ${{ vars.VAULT_ADDRESS }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: ${{ env.VAULT_SECRETS }}

      - name: Login to Forgejo registry
        uses: docker/login-action@v3
        with:
          registry: git.travisf.ca
          username: ${{ env.FORGEJO_ACTOR }}
          password: ${{ env.FORGEJO_CI_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${IMAGE_REPO}:${{ github.ref_name }} -t ${IMAGE_REPO}:latest .

      - name: Tag image with release number
        if: ${{ github.event_name == 'release' }}
        run: docker tag ${IMAGE_REPO}:${{ github.ref_name }} ${IMAGE_REPO}:release-${{ github.event.release.id }}

      - name: Push image tags
        run: |
          docker push ${IMAGE_REPO}:${{ github.ref_name }}
          docker push ${IMAGE_REPO}:latest

      - name: Push release number tag
        if: ${{ github.event_name == 'release' }}
        run: docker push ${IMAGE_REPO}:release-${{ github.event.release.id }}

